<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Edge Detection</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #3de8b0;
    --text: #e2e2f0;
    --muted: #555570;
    --danger: #ff5f6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  header {
    width: 100%; padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1.2rem;
    position: relative; z-index: 1;
  }

  .logo-mark {
    width: 44px; height: 44px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; font-weight: 700;
    color: var(--accent);
    box-shadow: 0 0 16px #7c6af740;
  }

  header h1 {
    font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em;
  }
  header h1 span { color: var(--accent); }

  header p {
    font-size: 0.8rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  main {
    width: 100%; max-width: 960px;
    padding: 3rem 2rem;
    position: relative; z-index: 1;
    display: flex; flex-direction: column; gap: 2rem;
  }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
  }

  .seg {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .seg label {
    padding: 0.55rem 1.1rem;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em;
    cursor: pointer; transition: background 0.15s, color 0.15s;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .seg input[type=radio] { display: none; }
  .seg input[type=radio]:checked + label {
    background: var(--accent);
    color: #fff;
  }

  .tile-wrap {
    display: flex; align-items: center; gap: 0.7rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 1rem;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .tile-wrap select {
    background: transparent;
    border: none; outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .tile-wrap select option { background: #1a1a2e; }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 3.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone.drag-over {
    border-color: var(--accent);
    background: #7c6af710;
  }

  .drop-zone .icon {
    font-size: 3rem; margin-bottom: 1rem;
    line-height: 1;
  }

  .drop-zone h2 {
    font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem;
  }

  .drop-zone p {
    font-size: 0.85rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* ── Process button ── */
  #processBtn {
    display: none;
    align-self: flex-start;
    background: var(--accent);
    color: #fff;
    border: none; border-radius: 8px;
    padding: 0.75rem 2rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  #processBtn:hover { opacity: 0.88; transform: translateY(-1px); }
  #processBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Status ── */
  #status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; color: var(--accent2);
    min-height: 1.2rem;
  }
  #status.error { color: var(--danger); }

  /* ── Progress bar ── */
  .progress-wrap {
    display: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.4s ease;
    animation: pulse-bar 1.5s ease-in-out infinite;
  }
  @keyframes pulse-bar {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }

  /* ── Results ── */
  #results {
    display: none;
    flex-direction: column;
    gap: 1.2rem;
  }

  .result-label {
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .result-card img {
    width: 100%; display: block;
    image-rendering: pixelated;
  }

  .result-card .card-footer {
    padding: 0.75rem 1rem;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border);
  }

  .badge {
    background: #7c6af720;
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  #downloadBtn {
    display: none;
    background: var(--surface);
    color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 0.65rem 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    align-self: flex-start;
  }
  #downloadBtn:hover { background: #3de8b015; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">QE</div>
  <div>
    <h1>Quantum <span>Edge</span> Detection</h1>
    <p>QPIE · FRQI · QHED — tiled quantum simulation</p>
  </div>
</header>

<main>

  <!-- Controls -->
  <div class="controls">
    <div class="seg">
      <input type="radio" name="method" id="m-qpie" value="qpie" checked>
      <label for="m-qpie">QPIE</label>
      <input type="radio" name="method" id="m-frqi" value="frqi">
      <label for="m-frqi">FRQI</label>
    </div>

    <div class="tile-wrap">
      TILE &nbsp;
      <select id="tileSelect">
        <option value="4">4 × 4  (fastest)</option>
        <option value="8">8 × 8</option>
        <option value="16" selected>16 × 16</option>
        <option value="32">32 × 32  (slowest)</option>
      </select>
    </div>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="icon">⬡</div>
    <h2>Drop your image here</h2>
    <p>or click to browse — JPG, PNG, WEBP, BMP</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="status"></div>
  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>

  <button id="processBtn">Run Quantum Edge Detection →</button>

  <!-- Results -->
  <div id="results">
    <div class="result-label">Output</div>
    <div class="result-grid">
      <div class="result-card">
        <img id="imgOriginal" alt="Original">
        <div class="card-footer">
          <span>Original (grayscale)</span>
          <span class="badge" id="dimBadge">—</span>
        </div>
      </div>
      <div class="result-card">
        <img id="imgEdges" alt="Edge map">
        <div class="card-footer">
          <span>Edge map</span>
          <span class="badge" id="methodBadge">—</span>
        </div>
      </div>
    </div>
  </div>

  <button id="downloadBtn">↓ Download edge map</button>

</main>

<script>
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const processBtn  = document.getElementById('processBtn');
  const status      = document.getElementById('status');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const results     = document.getElementById('results');
  const imgOriginal = document.getElementById('imgOriginal');
  const imgEdges    = document.getElementById('imgEdges');
  const dimBadge    = document.getElementById('dimBadge');
  const methodBadge = document.getElementById('methodBadge');
  const downloadBtn = document.getElementById('downloadBtn');

  let selectedFile = null;

  // Drag-and-drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) setFile(f);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  function setFile(f) {
    selectedFile = f;
    dropZone.querySelector('h2').textContent = f.name;
    dropZone.querySelector('p').textContent  =
      `${(f.size / 1024 / 1024).toFixed(2)} MB`;
    status.textContent = '';
    status.className   = '';
    processBtn.style.display = 'flex';
    results.style.display    = 'none';
    downloadBtn.style.display= 'none';
  }

  processBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    const method = document.querySelector('input[name=method]:checked').value;
    const tile   = document.getElementById('tileSelect').value;

    processBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressBar.style.width    = '15%';
    status.className = '';
    status.textContent = `Sending to server…`;

    const fd = new FormData();
    fd.append('image', selectedFile);
    fd.append('method', method);
    fd.append('tile',   tile);

    // Fake progress animation while waiting
    let pct = 15;
    const ticker = setInterval(() => {
      pct = Math.min(pct + 3, 85);
      progressBar.style.width = pct + '%';
    }, 800);

    try {
      const res = await fetch('/process', { method: 'POST', body: fd });
      clearInterval(ticker);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `Server error ${res.status}`);
      }

      const data = await res.json();

      progressBar.style.width = '100%';
      setTimeout(() => { progressWrap.style.display = 'none'; }, 400);

      imgOriginal.src = 'data:image/png;base64,' + data.original;
      imgEdges.src    = 'data:image/png;base64,' + data.edges;
      dimBadge.textContent    = `${data.width} × ${data.height}`;
      methodBadge.textContent = data.method;

      results.style.display     = 'flex';
      downloadBtn.style.display = 'block';
      status.textContent        = `Done ✓  ${data.width}×${data.height} px  |  ${data.method}`;

      // Wire download button
      downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href     = 'data:image/png;base64,' + data.edges;
        a.download = `edges_${data.method.toLowerCase()}.png`;
        a.click();
      };

    } catch (err) {
      clearInterval(ticker);
      progressWrap.style.display = 'none';
      status.textContent = '✗ ' + err.message;
      status.className   = 'error';
    } finally {
      processBtn.disabled = false;
    }
  });
</script>
</body>
</html>
